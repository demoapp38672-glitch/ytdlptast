<style>

  @media (max-width:640px){

<body>
<div class="player-wrap" id="playerWrap">
  <div class="iframe-container" id="iframe-container">
    <div id="player"></div>

    <!-- top / logo blockers -->
    <div class="top-blocker" id="topBlocker" aria-hidden="true"></div>
    <div class="logo-blocker" id="logoBlocker" aria-hidden="true"></div>

    <!-- Interaction blocker -->
    <div class="interaction-blocker" id="interactionBlocker" title="Tap to show controls"></div>

    <!-- Pause overlay -->
    <div id="pauseOverlay" class="pause-overlay" role="button" aria-hidden="true" title="Click to play">
      <div class="big-play" id="overlayPlayBtn" aria-hidden="false">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M8 5v14l11-7z" fill="currentColor"></path>
        </svg>
      </div>
    </div>

    <!-- Controls overlay -->
    <div class="controls-overlay" id="controlsOverlay" aria-hidden="false">
      <button class="btn" id="playBtn" title="Play / Pause">
        <svg class="play-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path id="playIconPath" d="M8 5v14l11-7z" fill="currentColor"/>
        </svg>
        <span id="playText">Play</span>
      </button>

      <input type="range" id="progress" class="progress" min="0" max="100" value="0" step="0.1" aria-label="Seek timeline">
      <div class="time" id="timeLabel">0:00 / 0:00</div>

      <label>
        <select id="speedSelect" class="control-select" title="Speed">
          <option value="0.25">0.25x</option><option value="0.5">0.5x</option><option value="0.75">0.75x</option>
          <option value="1" selected>1x</option><option value="1.25">1.25x</option><option value="1.5">1.5x</option><option value="2">2x</option>
        </select>
      </label>

      <label>
        <select id="qualitySelect" class="control-select" title="Quality">
          <option value="auto">Auto</option>
        </select>
      </label>

      <button class="btn" id="fsBtn" title="Fullscreen">Fullscreen</button>
    </div>
  </div>
</div>

<script>
  // Load YouTube IFrame API
  var tag = document.createElement('script'); tag.src = "https://www.youtube.com/iframe_api"; document.head.appendChild(tag);

  var player, videoId = "<?php echo $videoId; ?>", duration = 0, progressDragging = false, progressElem = null;
  var pauseOverlay = null, controls = null, interactionBlocker = null;

  var autoHideDelay = 5000; // 5 seconds
  var autoHideTimer = null, userInteracting = false;

  function onYouTubeIframeAPIReady() {
    player = new YT.Player('player', {
      height: '100%', width: '100%', videoId: videoId,
      playerVars: {
        'controls': 0, 'rel': 0, 'modestbranding': 1, 'iv_load_policy': 3, 'fs': 1,
        'cc_load_policy': 0, 'enablejsapi': 1, 'playsinline': 1, 'loop':1, 'playlist':videoId
      },
      events: { 'onReady': onPlayerReady, 'onStateChange': onPlayerStateChange, 'onPlaybackQualityChange': onPlaybackQualityChange }
    });
  }

  function onPlayerReady(e){
    duration = player.getDuration() || 0;
    progressElem = document.getElementById('progress');
    pauseOverlay = document.getElementById('pauseOverlay');
    controls = document.getElementById('controlsOverlay');
    interactionBlocker = document.getElementById('interactionBlocker');

    setupControls();
    populateQualityWithRetry();
    setInterval(updateProgress, 250);

    // show controls briefly then auto-hide
    showControls();
  }

  function onPlayerStateChange(e){
    updatePlayButton();
    if (e.data === YT.PlayerState.PLAYING) {
      updatePauseOverlay(false);
      showControls();
    } else if (e.data === YT.PlayerState.PAUSED) {
      updatePauseOverlay(true);
      showControls();
    } else if (e.data === YT.PlayerState.ENDED) {
      try { player.seekTo(0); player.playVideo(); } catch(err){ try{player.loadVideoById(videoId,0);}catch(e){} }
    }
  }

  function onPlaybackQualityChange(e){ setTimeout(populateQuality,200); }

  /* Controls show/hide + interactionBlocker handling */
  function showControls() {
    if (!controls) return;
    controls.classList.remove('hidden');
    if (interactionBlocker) { interactionBlocker.classList.remove('active'); }
    resetAutoHideTimer();
  }

  function hideControls() {
    if (!controls) return;
    if (pauseOverlay && pauseOverlay.classList.contains('visible')) return;
    controls.classList.add('hidden');
    if (interactionBlocker) { interactionBlocker.classList.add('active'); }
    clearAutoHideTimer();
  }

  function resetAutoHideTimer() {
    clearAutoHideTimer();
    autoHideTimer = setTimeout(function(){
      if (!userInteracting) hideControls();
    }, autoHideDelay);
  }
  function clearAutoHideTimer() { if (autoHideTimer) { clearTimeout(autoHideTimer); autoHideTimer = null; } }

  function registerInteractionHandlers() {
    var wrap = document.getElementById('playerWrap');

    function onUserActivity(e){ showControls(); }

    controls.addEventListener('pointerdown', function(e){
      userInteracting = true; clearAutoHideTimer();
      if (interactionBlocker) interactionBlocker.classList.remove('active');
    }, {passive:true});
    document.addEventListener('pointerup', function(e){
      setTimeout(function(){ userInteracting = false; resetAutoHideTimer(); }, 150);
    }, {passive:true});

    wrap.addEventListener('mousemove', onUserActivity);
    wrap.addEventListener('pointermove', onUserActivity);
    wrap.addEventListener('touchstart', onUserActivity, {passive:true});
    wrap.addEventListener('click', onUserActivity, {passive:true});

    if (interactionBlocker) {
      interactionBlocker.addEventListener('click', function(e){
        e.preventDefault(); e.stopPropagation();
        showControls();
      }, {passive:false});
      ['touchstart','touchend','pointerdown','pointerup','mousedown','mouseup','contextmenu'].forEach(function(ev){
        interactionBlocker.addEventListener(ev, function(evt){ evt.preventDefault(); evt.stopPropagation(); }, {passive:false});
      });
    }
  }

  function setupControls(){
    registerInteractionHandlers();

    var playBtn = document.getElementById('playBtn');
    var overlayPlay = document.getElementById('overlayPlayBtn');

    playBtn.addEventListener('click', function(ev){
      ev.stopPropagation(); showControls();
      var state = player.getPlayerState();
      if (state === YT.PlayerState.PLAYING) player.pauseVideo(); else player.playVideo();
      updatePlayButton();
    });

    overlayPlay.addEventListener('click', function(ev){
      ev.stopPropagation(); try { player.playVideo(); } catch(e){} updatePauseOverlay(false); updatePlayButton(); showControls();
    });

    pauseOverlay.addEventListener('click', function(ev){
      ev.stopPropagation(); try { player.playVideo(); } catch(e){} updatePauseOverlay(false); updatePlayButton(); showControls();
    });

    var progress = document.getElementById('progress');
    progress.addEventListener('input', function(ev){
      progressDragging = true; showControls();
      var pct = parseFloat(progress.value);
      var target = (pct/100) * (player.getDuration() || duration || 0);
      document.getElementById('timeLabel').textContent = formatTime(target) + " / " + formatTime(player.getDuration() || duration || 0);
    });
    progress.addEventListener('change', function(ev){
      showControls();
      var pct = parseFloat(progress.value);
      var target = (pct/100) * (player.getDuration() || duration || 0);
      player.seekTo(target, true);
      progressDragging = false;
    });

    var speedSelect = document.getElementById('speedSelect');
    speedSelect.addEventListener('change', function(ev){
      ev.stopPropagation(); showControls();
      var val = parseFloat(this.value);
      try { player.setPlaybackRate(val); } catch(err) {}
    });

    var qualitySelect = document.getElementById('qualitySelect');
    qualitySelect.addEventListener('change', function(ev){
      ev.stopPropagation(); showControls();
      var q = this.value;
      try { if (q === 'auto') player.setPlaybackQuality('default'); else player.setPlaybackQuality(q); } catch(e) {}
    });

    var fsBtn = document.getElementById('fsBtn');
    fsBtn.addEventListener('click', function(ev){
      ev.stopPropagation(); showControls();
      var container = document.getElementById('iframe-container');
      if (!document.fullscreenElement) {
        if (container.requestFullscreen) container.requestFullscreen();
        else if (container.mozRequestFullScreen) container.mozRequestFullScreen();
        else if (container.webkitRequestFullscreen) container.webkitRequestFullscreen();
        else if (container.msRequestFullscreen) container.msRequestFullscreen();
      } else {
        if (document.exitFullscreen) document.exitFullscreen();
      }
    });

    resetAutoHideTimer();
  }

  function updateProgress(){
    if (!player || !progressElem) return;
    var dur = player.getDuration() || duration || 0;
    if (dur <= 0) return;
    if (!progressDragging) {
      var cur = player.getCurrentTime() || 0;
      var pct = (cur / dur) * 100;
      progressElem.value = pct;
      updateTimeLabel();
    }
  }

  function updateTimeLabel(){
    if (!player) return;
    var cur = player.getCurrentTime() || 0;
    var dur = player.getDuration() || duration || 0;
    document.getElementById('timeLabel').textContent = formatTime(cur) + " / " + formatTime(dur);
  }

  function updatePlayButton(){
    if (!player) return;
    var state = player.getPlayerState();
    var isPlaying = (state === YT.PlayerState.PLAYING);
    var playText = document.getElementById('playText');
    var playIconPath = document.getElementById('playIconPath');
    if (isPlaying) {
      playText.textContent = 'Pause';
      playIconPath.setAttribute('d','M6 5h4v14H6z M14 5h4v14h-4z');
    } else {
      playText.textContent = 'Play';
      playIconPath.setAttribute('d','M8 5v14l11-7z');
    }
  }

  function updatePauseOverlay(show){
    if (!pauseOverlay) return;
    if (show) { pauseOverlay.classList.add('visible'); }
    else { pauseOverlay.classList.remove('visible'); }
  }

  // QUALITY helpers (best-effort)
  function populateQuality(){
    try {
      var qList = player.getAvailableQualityLevels ? player.getAvailableQualityLevels() : [];
      var select = document.getElementById('qualitySelect');
      var cur = player.getPlaybackQuality ? player.getPlaybackQuality() : 'auto';
      var optsHtml = '<option value="auto">Auto</option>';
      if (qList && qList.length) {
        qList.forEach(function(q){ optsHtml += '<option value="'+q+'">'+q+'</option>'; });
        select.innerHTML = optsHtml;
        try { select.value = cur || 'auto'; } catch(e){}
        return true;
      } else return false;
    } catch(err){ return false; }
  }
  var qualityRetries = 0, maxQualityRetries = 20;
  function populateQualityWithRetry(){
    var ok = populateQuality();
    if (ok) { qualityRetries = 0; return; }
    qualityRetries++;
    if (qualityRetries <= maxQualityRetries) setTimeout(populateQualityWithRetry, 300);
    else {
      var select = document.getElementById('qualitySelect');
      if (select && select.options.length <= 1) {
        var fav = ['hd1080','hd720','large','medium','small'];
        var optsHtml = '<option value="auto">Auto</option>';
        fav.forEach(function(q){ optsHtml += '<option value="'+q+'">'+q+'</option>'; });
        select.innerHTML = optsHtml;
      }
    }
  }

  function formatTime(sec) {
    sec = Math.max(0, Math.floor(sec || 0));
    var h = Math.floor(sec/3600), m = Math.floor((sec%3600)/60), s = sec%60;
    if (h>0) return h + ":" + String(m).padStart(2,'0') + ":" + String(s).padStart(2,'0');
    return m + ":" + String(s).padStart(2,'0');
  }

  // Block top and logo clicks
  (function blockTopClicks(){
    var blocker = document.getElementById('topBlocker'); if (!blocker) return;
    function stopAll(e){ e.preventDefault(); e.stopPropagation(); }
    ['click','mousedown','mouseup','touchstart','touchend','contextmenu'].forEach(function(evName){
      blocker.addEventListener(evName, stopAll, {passive:false});
    });
    blocker.style.pointerEvents = 'auto';
  })();

  (function blockLogoClicks(){
    var blocker = document.getElementById('logoBlocker'); if (!blocker) return;
    function stopAll(e){ e.preventDefault(); e.stopPropagation(); }
    ['click','mousedown','mouseup','touchstart','touchend','pointerdown','pointerup','contextmenu'].forEach(function(evName){
      blocker.addEventListener(evName, stopAll, {passive:false});
    });
    blocker.style.pointerEvents = 'auto';
  })();

  // Keyboard shortcuts reveal controls when used
  document.addEventListener('keydown', function(e){
    if (!player) return;
    showControls();
    if (e.key === ' ' || e.code === 'Space') {
      e.preventDefault();
      var s = player.getPlayerState();
      if (s === YT.PlayerState.PLAYING) player.pauseVideo(); else player.playVideo();
      updatePlayButton();
    } else if (e.key === 'ArrowRight') {
      var t = player.getCurrentTime() || 0; player.seekTo(t + 5, true);
    } else if (e.key === 'ArrowLeft') {
      var t = player.getCurrentTime() || 0; player.seekTo(Math.max(0, t - 5), true);
    } else if (e.key === 'f' || e.key === 'F') {
      var container = document.getElementById('iframe-container');
      if (!document.fullscreenElement) container.requestFullscreen().catch(()=>{}); else document.exitFullscreen().catch(()=>{});
    }
  });
</script>
</body>
</html>
