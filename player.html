  /* Center Pause Area (માત્ર 150px વિસ્તારમાં જ સિંગલ ક્લિક કામ કરશે) */

  /* Blockers */
  .top-blocker{position:absolute;top:0;left:0;width:100%;height:60px;z-index:57;}

<body>
<div class="player-wrap" id="playerWrap">
  <div class="iframe-container" id="iframe-container">

    <div class="skip-zone skip-left" id="skipLeft"></div>
    <div class="skip-zone skip-right" id="skipRight"></div>
    <div class="center-pause-zone" id="centerPause"></div>

    <div class="skip-label" id="skipLabelLeft" style="left: 15%;">⇠ 10s</div>
    <div class="skip-label" id="skipLabelRight" style="right: 15%;">10s ⇢</div>
    
    <div class="top-blocker"></div>
    <div class="logo-blocker"></div>

    <div id="pauseOverlay" class="pause-overlay">
      <div class="big-play"><svg viewBox="0 0 24 24" width="40" height="40" fill="white"><path d="M8 5v14l11-7z"></path></svg></div>
    </div>

    <div class="controls-overlay" id="controlsOverlay">
      <button class="btn" id="playBtn">Pause</button>
      <input type="range" id="progress" class="progress" min="0" max="100" value="0" step="0.1">
      <div id="timeLabel" style="font-size:12px; min-width:85px;">0:00 / 0:00</div>
      <select id="speedSelect" class="control-select"><option value="0.5">0.5x</option><option value="1" selected>1x</option><option value="1.5">1.5x</option><option value="2">2x</option></select>
      <select id="qualitySelect" class="control-select"><option value="default">Auto</option></select>
      <button class="btn" id="fsBtn">Full</button>
    </div>
  </div>
</div>

<script>
  var tag = document.createElement('script'); tag.src = "https://www.youtube.com/iframe_api"; document.head.appendChild(tag);
  var player, videoId = "<?php echo $videoId; ?>", dragging = false;

  function onYouTubeIframeAPIReady() {
    player = new YT.Player('player', {
      height: '100%', width: '100%', videoId: videoId,
      playerVars: { 
        'controls': 0, 
        'modestbranding': 1, 
        'rel': 0,      // પ્લેલિસ્ટ સજેશન બંધ કરવા (Same channel only)
        'loop': 1,     // લૂપ માટે
        'playlist': videoId, // લૂપ કામ કરે તે માટે વિડિયો આઈડી ફરી આપવી પડે
        'enablejsapi': 1 
      },
      events: { 'onReady': onReady, 'onStateChange': onStateChange }
    });
  }

  function onReady() { updateQualityOptions(); setInterval(updateUI, 500); }

  function onStateChange(e) {
    var controls = document.getElementById('controlsOverlay');
    var overlay = document.getElementById('pauseOverlay');
    
    // વિડિયો પૂરો થાય ત્યારે ફરી ચાલુ કરવો
    if (e.data === YT.PlayerState.ENDED) {
        player.playVideo(); 
    }

    if (e.data === YT.PlayerState.PAUSED) { 
        overlay.classList.add('visible'); 
        controls.classList.add('hidden'); 
    } else { 
        overlay.classList.remove('visible'); 
        controls.classList.remove('hidden'); 
    }
  }

  // Double Click Skip Logic
  function setupSkip(id, sec, label) {
    let last = 0;
    document.getElementById(id).addEventListener('click', () => {
      let now = Date.now();
      if (now - last < 350) {
        player.seekTo(player.getCurrentTime() + sec, true);
        let el = document.getElementById(label);
        el.classList.add('show'); setTimeout(() => el.classList.remove('show'), 600);
      }
      last = now;
    });
  }
  setupSkip('skipLeft', -10, 'skipLabelLeft');
  setupSkip('skipRight', 10, 'skipLabelRight');

  // Center Pause
  document.getElementById('centerPause').addEventListener('click', () => {
    if (player.getPlayerState() === 1) player.pauseVideo(); else player.playVideo();
  });

  function updateUI() {
    if (!player || dragging) return;
    let cur = player.getCurrentTime(), dur = player.getDuration();
    if (dur > 0) {
        document.getElementById('progress').value = (cur / dur) * 100;
        document.getElementById('timeLabel').textContent = formatTime(cur) + " / " + formatTime(dur);
    }
    document.getElementById('playBtn').textContent = player.getPlayerState() === 1 ? 'Pause' : 'Play';
  }

  function formatTime(s) {
    let m = Math.floor(s/60), sec = Math.floor(s%60);
    return m + ":" + (sec < 10 ? '0' + sec : sec);
  }

  function updateQualityOptions() {
    let qualities = player.getAvailableQualityLevels();
    let select = document.getElementById('qualitySelect');
    if (qualities && qualities.length > 0) {
        select.innerHTML = '<option value="default">Auto</option>';
        qualities.forEach(q => {
            let label = q.replace('hd', '').replace('large', '480p').replace('medium', '360p').replace('small', '240p').replace('tiny', '144p');
            if(q.includes('hd')) label += 'p HD';
            select.innerHTML += `<option value="${q}">${label}</option>`;
        });
    }
  }

  // Buttons Logic
  document.getElementById('playBtn').addEventListener('click', () => {
    if (player.getPlayerState() === 1) player.pauseVideo(); else player.playVideo();
  });
  document.getElementById('progress').addEventListener('input', () => dragging = true);
  document.getElementById('progress').addEventListener('change', function() {
    player.seekTo((this.value / 100) * player.getDuration());
    dragging = false;
  });
  document.getElementById('speedSelect').addEventListener('change', e => player.setPlaybackRate(parseFloat(e.target.value)));
  document.getElementById('qualitySelect').addEventListener('change', e => {
      player.setPlaybackQuality(e.target.value);
      player.seekTo(player.getCurrentTime(), true);
  });
  document.getElementById('fsBtn').addEventListener('click', () => {
    let el = document.getElementById('iframe-container');
    if (!document.fullscreenElement) el.requestFullscreen(); else document.exitFullscreen();
  });
</script>
</body>
</html>
